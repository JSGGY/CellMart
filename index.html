<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CellMart — Smartphones al mejor precio</title>
  <meta name="description" content="Tienda online de smartphones con los mejores precios y ofertas.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let filteredPhones = [...phones];

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = renderBanner() + renderHiddenNav() +
      `<div class="topbar">
        <div class="topbar-inner">
          <h1 class="playfair" style="font-size:24px;font-weight:700">CellMart</h1>
          <div class="topbar-info">
            <span>🚚 Envío gratis</span>
            <span>🛡 Garantía</span>
            <span>💳 Pagos seguros</span>
          </div>
        </div>
      </div>
      <div class="hero">
        <div class="hero-inner">
          <p class="sub">Los mejores smartphones</p>
          <h2 class="playfair">Encuentra tu próximo dispositivo</h2>
          <div class="search-box">
            <input id="searchInput" placeholder="Buscar por marca o modelo...">
            <button onclick="applyFilters()">Buscar</button>
          </div>
        </div>
      </div>
      <div class="marquee-bar"><span class="marquee-text">🔥 Oferta limitada: Hasta 40% de descuento · Envío express en 24h · Financiamiento sin intereses · Garantía extendida incluida</span></div>
      <div class="container">
        <div class="grid-layout">
          <div>
            <div class="filters">
              <h3>Filtros</h3>
              <label>Marca</label>
              <select id="fBrand">
                <option value="">Todas las marcas</option>
                <option>Apple</option>
                <option>Samsung</option>
                <option>Google</option>
                <option>OnePlus</option>
                <option>Sony</option>
                <option>Huawei</option>
              </select>
              <button onclick="applyFilters()">Aplicar filtros</button>
            </div>
          </div>
          <div>
            <div class="product-grid" id="productGrid"></div>
            <div class="no-results" id="noResults" style="display:none"><p>No se encontraron resultados</p><p>Intenta ajustar los filtros de búsqueda.</p></div>
          </div>
        </div>
      </div>` + renderFooter();

      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      const noRes = document.getElementById('noResults');
      if (filteredPhones.length === 0) { grid.style.display='none'; noRes.style.display='block'; return; }
      grid.style.display=''; noRes.style.display='none';
      grid.innerHTML = filteredPhones.map(p => `
        <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
          <img src="${p.image}" alt="${p.name}">
          <div class="info">
            <p class="brand">${p.brand}</p>
            <h3 class="name">${p.name}</h3>
            <p class="specs">${p.specs}</p>
            <div class="bottom">
              <span>Verificar precio →</span>
              <div class="evasive-wrap" data-id="${p.id}" onclick="event.stopPropagation()"></div>
            </div>
          </div>
        </div>`).join('');
      document.querySelectorAll('.evasive-wrap').forEach(el => {
        const phone = phones.find(p => p.id == el.dataset.id);
        createEvasiveButton(el, () => showToast('Producto agregado', phone.name + ' fue añadido a tu carrito.'));
      });
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const brand = document.getElementById('fBrand').value;

      filteredPhones = phones.filter(p => {
        const nameMatch = p.name.toLowerCase().includes(searchTerm) || p.brand.toLowerCase().includes(searchTerm);
        const brandMatch = !brand || p.brand === brand;
        return nameMatch && brandMatch;
      });
      renderProducts();
    }

    render();
  </script>
</body>
</html>
