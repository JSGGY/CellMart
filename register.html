<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CellMart — Crear cuenta</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('app').innerHTML = renderBanner() + renderHiddenNav() + renderModal() +
    `<div class="register-wrap">
      <div class="register-form">
        <h1 class="playfair">Crear cuenta</h1>
        <p class="subtitle">Ingresa tus datos para registrarte</p>
        <form onsubmit="event.preventDefault(); openModal('Verifica tus datos', 'Revisa que tu correo sea válido y tu contraseña cumpla con los requisitos de seguridad.');">
          <div class="field">
            <label>Correo electrónico</label>
            <input type="email" placeholder="nombre@ejemplo.com" required>
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input type="password" id="pwInput" placeholder="Ingresa tu contraseña (mín. 8 caracteres)" required minlength="8">
          </div>
          <div class="field">
            <label>Nombre de tu primera mascota</label>
            <input placeholder="Pregunta de seguridad" required>
          </div>
          <button type="submit">Crear cuenta</button>
          <p class="legal">Al registrarte aceptas nuestros términos de servicio y política de privacidad.</p>
        </form>
      </div>
    </div>`;
  </script>
</body>
</html>
